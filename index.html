            transform: scale(0);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
            width: 20px;
            text-align: center;
        }
        
        .link-text {
            font-size: 0.9rem;
            font-weight: 600;
            color: #2980b9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-grow: 1;
        }

        // Generate Grid
        function renderLinks(filterTag = 'all') {
            gridContainer.innerHTML = ''; // Clear current grid
            
            referrals.forEach(site => {
                // Check if item matches filter
                if (filterTag !== 'all' && !site.tags.includes(filterTag)) {
                    return; // Skip this item if it doesn't match the filter
                }

                const item = document.createElement('a');
                item.href = site.url;
                item.target = "_blank";
                item.rel = "noopener noreferrer";
                item.className = 'link-item';
                
                if (visitedLinks.includes(site.url)) {
                    item.classList.add('visited');
                }

                item.onclick = () => markVisited(site.url, item);

                item.innerHTML = `
                    <span class="checkmark">✓</span>
                    <span class="link-text">${site.name}</span>
                `;
                gridContainer.appendChild(item);
            });
        }

        // Filter Function
        function filterLinks(tag, btnElement) {
            // Update active button style
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            
            // Re-render grid with new filter
            renderLinks(tag);
        }

        function markVisited(url, element) {
            if (!visitedLinks.includes(url)) {
                visitedLinks.push(url);
                localStorage.setItem('clickedLinks', JSON.stringify(visitedLinks));
                element.classList.add('visited');
            }
        }

        function resetTracker() {
            if(confirm("Clear all checkmarks?")) {
                localStorage.removeItem('clickedLinks');
                visitedLinks = [];
                location.reload();
            }
        }
